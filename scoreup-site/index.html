<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ScoreUp – SAT & ACT Study Hub</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08090c;--bg-card:#0f1117;--bg-card-hover:#141720;--bg-elevated:#1a1e2a;--bg-input:#0c0e14;
--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);--border-strong:rgba(255,255,255,0.18);
--text-1:#eef0f7;--text-2:#7b8499;--text-3:#3d4459;
--sat:#7c9ff5;--sat-rw:#b39dfa;--sat-math:#7c9ff5;
--act:#4ecdc4;--act-eng:#4ecdc4;--act-math:#7c9ff5;--act-sci:#f5a623;--act-writ:#f06292;
--success:#43d98c;--danger:#f56565;--warning:#f6ad55;--info:#63b3ed;
--r-sm:8px;--r:12px;--r-lg:16px;--r-xl:24px;
--font-d:'Space Grotesk',sans-serif;--font-b:'Inter',sans-serif;
--ease:cubic-bezier(.4,0,.2,1);--dur:180ms;
}
[data-theme=light]{
--bg:#f2f4f9;--bg-card:#ffffff;--bg-card-hover:#eef1fb;--bg-elevated:#e8ecf7;--bg-input:#f7f8fc;
--border:rgba(0,0,0,0.07);--border-hover:rgba(0,0,0,0.13);--border-strong:rgba(0,0,0,0.2);
--text-1:#0d1020;--text-2:#4a5270;--text-3:#9aa0b8;
}
html,body,#root{height:100%;background:var(--bg);font-family:var(--font-b);color:var(--text-1)}
body{overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}
button{font-family:var(--font-b);cursor:pointer}
input,textarea{font-family:var(--font-b)}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:58px;background:rgba(8,9,12,0.82);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
[data-theme=light] .nav{background:rgba(242,244,249,0.85)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--sat-rw),var(--sat));display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-family:var(--font-d);font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.nav-center{display:flex;gap:4px}
.nav-tab{padding:6px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--text-2);background:none;border:none;transition:all var(--dur) var(--ease)}
.nav-tab:hover{color:var(--text-1);background:var(--bg-elevated)}
.nav-tab.active{color:var(--text-1);background:var(--bg-elevated)}
.nav-right{display:flex;align-items:center;gap:10px}
.streak-pill{display:flex;align-items:center;gap:5px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--text-1)}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--dur) var(--ease);color:var(--text-2)}
.icon-btn:hover{border-color:var(--border-hover);color:var(--text-1)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--sat-rw),var(--act));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}
.btn-nav{padding:6px 16px;border-radius:var(--r-sm);background:var(--sat);color:#fff;border:none;font-size:13px;font-weight:600;transition:all var(--dur) var(--ease)}
.btn-nav:hover{opacity:.88;transform:translateY(-1px)}

/* ── LAYOUT ── */
.app{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.page{flex:1;padding:2.5rem 2rem;max-width:980px;margin:0 auto;width:100%}
.page-wide{flex:1;padding:2.5rem 2rem;max-width:1100px;margin:0 auto;width:100%}

/* ── ONBOARDING ── */
.onboard-wrap{min-height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;padding:2rem}
.onboard-card{background:var(--bg-card);border:1px solid var(--border);border-radius:28px;padding:3rem;width:100%;max-width:520px;position:relative;overflow:hidden}
.onboard-card::before{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(124,159,245,.07) 0%,transparent 70%);pointer-events:none}
.ob-step-dots{display:flex;gap:6px;margin-bottom:2rem}
.ob-dot{height:3px;border-radius:2px;background:var(--border-hover);transition:all .4s var(--ease)}
.ob-dot.active{background:var(--sat);width:28px!important}
.ob-dot.done{background:var(--success)}
.ob-icon{font-size:40px;margin-bottom:1.25rem}
.ob-title{font-family:var(--font-d);font-size:1.65rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.5rem;line-height:1.2}
.ob-sub{font-size:14px;color:var(--text-2);line-height:1.7;margin-bottom:2rem}
.ob-choices{display:grid;gap:10px;margin-bottom:2rem}
.ob-choice{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r);background:var(--bg-input);border:1.5px solid var(--border);cursor:pointer;transition:all var(--dur) var(--ease);text-align:left}
.ob-choice:hover{border-color:var(--border-hover);background:var(--bg-elevated)}
.ob-choice.sel{border-color:var(--sat);background:rgba(124,159,245,.08)}
.ob-choice-icon{font-size:22px;flex-shrink:0}
.ob-choice-text{font-size:14px;font-weight:500}
.ob-choice-sub{font-size:12px;color:var(--text-2);margin-top:2px}
.ob-choice-check{margin-left:auto;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-hover);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all var(--dur) var(--ease)}
.ob-choice.sel .ob-choice-check{background:var(--sat);border-color:var(--sat);color:#fff}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:2rem}
.ob-actions{display:flex;gap:10px}
.btn-ob-back{flex:1;padding:13px;border-radius:var(--r);background:var(--bg-elevated);color:var(--text-2);border:1px solid var(--border);font-size:14px;font-weight:500;transition:all var(--dur) var(--ease)}
.btn-ob-back:hover{color:var(--text-1);border-color:var(--border-hover)}
.btn-ob-next{flex:2;padding:13px;border-radius:var(--r);background:var(--sat);color:#fff;border:none;font-size:14px;font-weight:600;transition:all var(--dur) var(--ease)}
.btn-ob-next:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,159,245,.28)}
.btn-ob-next:disabled{opacity:.38;cursor:not-allowed}
.input-field{width:100%;padding:12px 14px;border-radius:var(--r);background:var(--bg-input);border:1.5px solid var(--border);color:var(--text-1);font-size:14px;outline:none;transition:all var(--dur) var(--ease);margin-bottom:10px}
.input-field:focus{border-color:var(--sat);box-shadow:0 0 0 3px rgba(124,159,245,.12)}
.input-label{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.ob-avatar-row{display:flex;gap:10px;margin-bottom:2rem;flex-wrap:wrap}
.ob-avatar-opt{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:2px solid transparent;transition:all var(--dur) var(--ease)}
.ob-avatar-opt:hover{transform:scale(1.08)}
.ob-avatar-opt.sel{border-color:var(--sat);box-shadow:0 0 0 3px rgba(124,159,245,.2)}
.difficulty-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
.diff-opt{padding:14px 10px;border-radius:var(--r);background:var(--bg-input);border:1.5px solid var(--border);cursor:pointer;text-align:center;transition:all var(--dur) var(--ease)}
.diff-opt:hover{border-color:var(--border-hover)}
.diff-opt.sel{border-color:var(--sat);background:rgba(124,159,245,.08)}
.diff-opt-icon{font-size:22px;margin-bottom:6px}
.diff-opt-label{font-size:13px;font-weight:600}
.diff-opt-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.ob-progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:2rem;overflow:hidden}
.ob-progress-fill{height:100%;background:var(--sat);border-radius:2px;transition:width .5s var(--ease)}

/* ── AUTH MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:2.5rem;width:100%;max-width:400px}
.modal-title{font-family:var(--font-d);font-size:1.45rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.4rem}
.modal-sub{font-size:13px;color:var(--text-2);margin-bottom:1.75rem;line-height:1.6}
.btn-full{width:100%;padding:12px;border-radius:var(--r);background:var(--sat);color:#fff;border:none;font-size:14px;font-weight:600;transition:all var(--dur) var(--ease);margin-top:.25rem}
.btn-full:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-full:disabled{opacity:.4;cursor:not-allowed}
.btn-full.ghost{background:var(--bg-elevated);color:var(--text-1);border:1px solid var(--border);margin-top:.5rem}
.btn-full.ghost:hover{border-color:var(--border-hover)}
.divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;color:var(--text-3)}
.toggle-link{text-align:center;font-size:13px;color:var(--text-2);margin-top:1.1rem}
.toggle-link span{color:var(--sat);cursor:pointer;font-weight:500}
.config-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-top:1rem;font-size:11px;color:var(--text-2);line-height:1.6}
.config-box code{color:var(--sat);font-size:10.5px}
.err{font-size:12px;color:var(--danger);margin-top:6px}

/* ── DASHBOARD ── */
.dash-greet{margin-bottom:2rem}
.dash-greet-title{font-family:var(--font-d);font-size:clamp(1.5rem,3vw,2rem);font-weight:700;letter-spacing:-.03em;margin-bottom:.25rem}
.dash-greet-sub{font-size:14px;color:var(--text-2)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem}
.stat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:.5rem}
.stat-val{font-family:var(--font-d);font-size:1.85rem;font-weight:700;letter-spacing:-.03em;line-height:1}
.stat-meta{font-size:11px;color:var(--text-3);margin-top:4px}
.section-hd{font-family:var(--font-d);font-size:.95rem;font-weight:600;letter-spacing:-.01em;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.section-hd-link{font-size:12px;font-weight:400;color:var(--sat);cursor:pointer}
.section-hd-link:hover{text-decoration:underline}

/* ── STREAK CAL ── */
.cal-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:2rem}
.cal-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:.85rem}
.cal-day{width:13px;height:13px;border-radius:3px;background:var(--bg-elevated);transition:background .2s}
.cal-day.on{background:var(--sat)}
.cal-day.today{background:var(--act);box-shadow:0 0 0 2px rgba(78,205,196,.3)}
.cal-leg{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--text-3)}
.cal-leg-box{width:11px;height:11px;border-radius:2px}

/* ── WEAKNESS ── */
.focus-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
.focus-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem}
.focus-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:500;margin-bottom:7px}
.focus-score{font-size:12px;font-weight:700}
.pbar{height:5px;background:var(--bg-elevated);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}

/* ── TEST CARDS ── */
.test-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.test-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:2rem;cursor:pointer;transition:all var(--dur) var(--ease);position:relative;overflow:hidden}
.test-card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s}
.test-card.sat::after{background:radial-gradient(circle at 90% 10%,rgba(124,159,245,.07),transparent 60%)}
.test-card.act::after{background:radial-gradient(circle at 90% 10%,rgba(78,205,196,.07),transparent 60%)}
.test-card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.35)}
.test-card:hover::after{opacity:1}
.tc-icon{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:1.1rem}
.test-card.sat .tc-icon{background:rgba(124,159,245,.14);color:var(--sat)}
.test-card.act .tc-icon{background:rgba(78,205,196,.14);color:var(--act)}
.tc-title{font-family:var(--font-d);font-size:1.3rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.4rem}
.tc-desc{font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:1.4rem}
.tc-pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}

/* ── HUB PAGE ── */
.hub-hero{text-align:center;padding:1.5rem 0 2.5rem}
.hub-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:20px;padding:4px 14px;margin-bottom:1rem}
.hub-title{font-family:var(--font-d);font-size:clamp(1.4rem,3vw,2rem);font-weight:700;letter-spacing:-.03em;margin-bottom:.6rem}
.hub-sub{font-size:14px;color:var(--text-2);max-width:400px;margin:0 auto;line-height:1.6}
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:1rem;margin-bottom:2rem}
.subj-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.5rem;cursor:pointer;transition:all var(--dur) var(--ease)}
.subj-card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.28)}
.subj-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:.9rem}
.subj-name{font-family:var(--font-d);font-size:1rem;font-weight:600;letter-spacing:-.01em;margin-bottom:3px}
.subj-count{font-size:11px;color:var(--text-3);margin-bottom:.85rem}
.assess-banner{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.4rem 1.8rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.assess-text h3{font-family:var(--font-d);font-size:1rem;font-weight:600;margin-bottom:3px}
.assess-text p{font-size:13px;color:var(--text-2)}

/* ── QTYPE MODAL ── */
.qtype-modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:2.5rem;width:100%;max-width:360px;text-align:center}
.qtype-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1.5rem 0}
.qtype-opt{padding:1.25rem 1rem;border-radius:var(--r);background:var(--bg-input);border:2px solid var(--border);cursor:pointer;transition:all var(--dur) var(--ease)}
.qtype-opt:hover,.qtype-opt.sel{border-color:var(--sat);background:rgba(124,159,245,.07)}
.qtype-opt-icon{font-size:26px;margin-bottom:7px}
.qtype-opt-lbl{font-size:14px;font-weight:600}
.qtype-opt-sub{font-size:11px;color:var(--text-2);margin-top:3px}

/* ── SESSION ── */
.sess-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);gap:1rem;flex-wrap:wrap}
.sess-meta{display:flex;align-items:center;gap:10px}
.sess-badge{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.sess-prog-wrap{flex:1;min-width:140px;max-width:200px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:5px}
.prog-track{height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s var(--ease)}
.score-chips{display:flex;gap:8px}
.score-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border);font-size:12px;font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.q-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:2.5rem;margin-bottom:1.5rem}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:1.4rem;flex-wrap:wrap}
.q-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:20px}
.q-diff{font-size:12px;color:var(--text-2)}
.diff-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.diff-easy{background:rgba(67,217,140,.12);color:var(--success)}
.diff-medium{background:rgba(246,173,85,.12);color:var(--warning)}
.diff-hard{background:rgba(245,101,101,.12);color:var(--danger)}
.q-passage{font-size:13.5px;line-height:1.85;color:var(--text-2);background:var(--bg-elevated);border-left:3px solid var(--border-hover);padding:1rem 1.2rem;border-radius:0 var(--r-sm) var(--r-sm) 0;margin-bottom:1.4rem;font-style:italic}
.q-text{font-size:1.04rem;line-height:1.78;margin-bottom:2rem}
.choices{display:flex;flex-direction:column;gap:9px}
.choice{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border-radius:var(--r);background:var(--bg-input);border:1.5px solid var(--border);cursor:pointer;transition:all var(--dur) var(--ease);text-align:left;width:100%}
.choice:hover:not(:disabled):not(.correct):not(.wrong){border-color:var(--border-hover);background:var(--bg-elevated)}
.choice.selected{border-color:var(--sat);background:rgba(124,159,245,.08)}
.choice.correct{border-color:var(--success);background:rgba(67,217,140,.07)}
.choice.wrong{border-color:var(--danger);background:rgba(245,101,101,.07)}
.choice:disabled{cursor:default}
.choice-letter{width:27px;height:27px;border-radius:50%;background:var(--bg-elevated);border:1.5px solid var(--border-hover);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all var(--dur) var(--ease)}
.choice.selected .choice-letter{background:var(--sat);border-color:var(--sat);color:#fff}
.choice.correct .choice-letter{background:var(--success);border-color:var(--success);color:#fff}
.choice.wrong .choice-letter{background:var(--danger);border-color:var(--danger);color:#fff}
.choice-text{font-size:14px;line-height:1.6;padding-top:3px}
.frq-area{width:100%;min-height:170px;padding:15px;border-radius:var(--r);background:var(--bg-input);border:1.5px solid var(--border);color:var(--text-1);font-size:14px;line-height:1.75;resize:vertical;outline:none;transition:all var(--dur) var(--ease)}
.frq-area:focus{border-color:var(--sat);box-shadow:0 0 0 3px rgba(124,159,245,.1)}
.frq-area:disabled{opacity:.6;cursor:default}
.sess-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.sess-hint{font-size:12px;color:var(--text-3)}
.btn-sess{padding:11px 22px;border-radius:var(--r-sm);border:none;font-size:14px;font-weight:600;transition:all var(--dur) var(--ease)}
.btn-sess.primary{background:var(--sat);color:#fff}
.btn-sess.primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,159,245,.28)}
.btn-sess.primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-sess.ghost{background:var(--bg-card);color:var(--text-2);border:1px solid var(--border)}
.btn-sess.ghost:hover{border-color:var(--border-hover);color:var(--text-1)}
.expl-box{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--sat);border-radius:0 var(--r) var(--r) 0;padding:1.2rem 1.5rem;margin-top:1.5rem}
.expl-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sat);margin-bottom:7px}
.expl-text{font-size:13.5px;line-height:1.72;color:var(--text-2)}
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:4rem 0}
.spinner{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--sat);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-lbl{font-size:13px;color:var(--text-2)}

/* ── SUMMARY ── */
.summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:2.5rem;text-align:center;margin-bottom:2rem}
.ring-wrap{position:relative;width:140px;height:140px;margin:0 auto 1.5rem}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-family:var(--font-d);font-size:2.1rem;font-weight:700;letter-spacing:-.03em}
.ring-denom{font-size:12px;color:var(--text-3);margin-top:2px}
.sum-title{font-family:var(--font-d);font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
.sum-sub{font-size:14px;color:var(--text-2);margin-bottom:2rem}
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;text-align:left}
.bd-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1rem}
.bd-topic{font-size:12px;font-weight:500;margin-bottom:6px;color:var(--text-2)}
.bd-score{font-family:var(--font-d);font-size:1.5rem;font-weight:700}
.bd-pct{font-size:11px;color:var(--text-3);margin-top:2px}
.sum-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-sum{padding:11px 22px;border-radius:var(--r-sm);font-size:14px;font-weight:600;border:none;transition:all var(--dur) var(--ease);cursor:pointer}
.btn-sum.primary{background:var(--sat);color:#fff}
.btn-sum.primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,159,245,.25)}
.btn-sum.ghost{background:var(--bg-card);color:var(--text-1);border:1px solid var(--border)}
.btn-sum.ghost:hover{border-color:var(--border-hover)}

/* ── PROFILE ── */
.profile-layout{display:grid;grid-template-columns:280px 1fr;gap:2rem;align-items:start}
.profile-sidebar{display:flex;flex-direction:column;gap:1rem}
.profile-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.profile-banner{height:80px;background:linear-gradient(135deg,var(--sat-rw),var(--sat),var(--act));position:relative}
.profile-av{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid var(--bg-card);position:absolute;bottom:-28px;left:50%;transform:translateX(-50%)}
.profile-info{padding:2.5rem 1.5rem 1.5rem;text-align:center}
.profile-name{font-family:var(--font-d);font-size:1.15rem;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
.profile-handle{font-size:12px;color:var(--text-2)}
.profile-badges{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:1rem}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-2)}
.badge.gold{background:rgba(246,173,85,.12);border-color:rgba(246,173,85,.3);color:var(--warning)}
.badge.blue{background:rgba(124,159,245,.1);border-color:rgba(124,159,245,.25);color:var(--sat)}
.badge.green{background:rgba(67,217,140,.1);border-color:rgba(67,217,140,.25);color:var(--success)}
.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border);margin-top:1rem}
.profile-stat{background:var(--bg-card);padding:1rem;text-align:center}
.profile-stat-val{font-family:var(--font-d);font-size:1.3rem;font-weight:700}
.profile-stat-lbl{font-size:11px;color:var(--text-3);margin-top:2px}
.setting-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none;padding-bottom:0}
.setting-row:first-child{padding-top:0}
.setting-lbl{font-size:14px;font-weight:500}
.setting-sub{font-size:12px;color:var(--text-2);margin-top:1px}
.toggle-switch{width:40px;height:22px;border-radius:11px;background:var(--bg-elevated);border:1.5px solid var(--border-hover);cursor:pointer;position:relative;transition:all .25s var(--ease)}
.toggle-switch.on{background:var(--sat);border-color:var(--sat)}
.toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:1px;left:1px;transition:all .25s var(--ease);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle-switch.on .toggle-knob{left:19px}
.diff-select{display:flex;gap:8px}
.diff-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg-input);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--dur) var(--ease);color:var(--text-2)}
.diff-chip:hover{border-color:var(--border-hover);color:var(--text-1)}
.diff-chip.on-easy{background:rgba(67,217,140,.1);border-color:var(--success);color:var(--success)}
.diff-chip.on-medium{background:rgba(246,173,85,.1);border-color:var(--warning);color:var(--warning)}
.diff-chip.on-hard{background:rgba(245,101,101,.1);border-color:var(--danger);color:var(--danger)}
.profile-main{display:flex;flex-direction:column;gap:1.5rem}
.mastery-list{display:flex;flex-direction:column;gap:10px}
.mastery-row{display:flex;align-items:center;gap:12px}
.mastery-lbl{font-size:13px;width:160px;flex-shrink:0;color:var(--text-2)}
.mastery-bar-wrap{flex:1}
.mastery-bar{height:6px;background:var(--bg-elevated);border-radius:3px;overflow:hidden}
.mastery-fill{height:100%;border-radius:3px;transition:width .7s var(--ease)}
.mastery-pct{font-size:12px;font-weight:600;width:38px;text-align:right;flex-shrink:0}
.history-list{display:flex;flex-direction:column;gap:8px}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);font-size:13px}
.hist-icon{font-size:18px}
.hist-lbl{flex:1;font-weight:500}
.hist-meta{font-size:11px;color:var(--text-3)}
.hist-score{font-weight:700;font-size:14px}
.section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.5rem}

/* ── LEADERBOARD ── */
.lb-tabs{display:flex;gap:6px;margin-bottom:1.75rem}
.lb-tab{padding:7px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--text-2);background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all var(--dur) var(--ease)}
.lb-tab.active{background:var(--sat);color:#fff;border-color:var(--sat)}
.lb-layout{display:grid;grid-template-columns:1fr 320px;gap:2rem;align-items:start}
.lb-podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:2rem 1rem 0;margin-bottom:1.5rem}
.podium-slot{display:flex;flex-direction:column;align-items:center;gap:8px}
.podium-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2.5px solid var(--border-hover);position:relative}
.podium-av .crown{position:absolute;top:-14px;font-size:16px}
.podium-name{font-size:12px;font-weight:600;text-align:center;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-score{font-size:11px;color:var(--text-2)}
.podium-block{border-radius:var(--r-sm) var(--r-sm) 0 0;width:68px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:1.3rem;font-weight:700;color:#fff}
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);transition:all var(--dur) var(--ease)}
.lb-row.me{border-color:var(--sat);background:rgba(124,159,245,.06)}
.lb-rank{font-family:var(--font-d);font-size:1rem;font-weight:700;width:28px;text-align:center;color:var(--text-3);flex-shrink:0}
.lb-row:nth-child(1) .lb-rank{color:var(--warning)}
.lb-row:nth-child(2) .lb-rank{color:var(--text-2)}
.lb-row:nth-child(3) .lb-rank{color:var(--warning);opacity:.65}
.lb-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.lb-name{flex:1;font-size:14px;font-weight:500}
.lb-you{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sat);margin-left:4px}
.lb-pts{font-family:var(--font-d);font-size:14px;font-weight:700}
.lb-pts-lbl{font-size:11px;color:var(--text-3)}
.lb-sidebar{display:flex;flex-direction:column;gap:1rem}
.lb-your-card{background:var(--bg-card);border:1.5px solid var(--sat);border-radius:var(--r-lg);padding:1.4rem}
.lb-your-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sat);margin-bottom:1rem}
.lb-your-rank{font-family:var(--font-d);font-size:2.5rem;font-weight:700;letter-spacing:-.04em;margin-bottom:2px}
.lb-your-sub{font-size:13px;color:var(--text-2);margin-bottom:1rem}
.lb-your-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lb-your-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:.75rem;text-align:center}
.lb-your-stat-val{font-family:var(--font-d);font-size:1.2rem;font-weight:700}
.lb-your-stat-lbl{font-size:10px;color:var(--text-3);margin-top:2px}
.lb-reward-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.4rem}
.lb-reward-title{font-size:13px;font-weight:600;margin-bottom:.85rem}
.lb-reward-list{display:flex;flex-direction:column;gap:7px}
.lb-reward-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-2)}
.lb-reward-badge{font-size:18px}

/* ── LANDING ── */
.land-wrap{padding:5rem 2rem 3rem;text-align:center;max-width:680px;margin:0 auto}
.land-eyebrow{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sat);background:rgba(124,159,245,.1);border:1px solid rgba(124,159,245,.2);border-radius:20px;padding:4px 14px;margin-bottom:1.5rem}
.land-title{font-family:var(--font-d);font-size:clamp(2.2rem,5vw,3.6rem);font-weight:700;letter-spacing:-.04em;line-height:1.08;margin-bottom:1.2rem}
.land-title span{background:linear-gradient(135deg,var(--sat-rw),var(--sat),var(--act));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.land-sub{font-size:1.05rem;color:var(--text-2);max-width:440px;margin:0 auto 2.5rem;line-height:1.72}
.land-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:3rem}
.btn-land-p{padding:13px 30px;border-radius:var(--r);background:var(--sat);color:#fff;border:none;font-size:15px;font-weight:600;transition:all var(--dur) var(--ease)}
.btn-land-p:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,159,245,.32)}
.btn-land-s{padding:13px 30px;border-radius:var(--r);background:var(--bg-card);color:var(--text-1);border:1px solid var(--border);font-size:15px;font-weight:500;transition:all var(--dur) var(--ease)}
.btn-land-s:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.land-features{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:860px;margin:0 auto}
.land-feat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.5rem;text-align:left}
.land-feat-icon{font-size:26px;margin-bottom:.85rem}
.land-feat-title{font-family:var(--font-d);font-size:.95rem;font-weight:600;margin-bottom:.4rem}
.land-feat-desc{font-size:13px;color:var(--text-2);line-height:1.6}

/* ── BACK BTN ── */
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);cursor:pointer;margin-bottom:1.75rem;background:none;border:none;padding:0;transition:color var(--dur) var(--ease)}
.back-btn:hover{color:var(--text-1)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);border:1px solid var(--border-strong);border-radius:var(--r);padding:12px 20px;font-size:13px;font-weight:500;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.4);transition:transform .3s var(--ease),opacity .3s;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:768px){
.test-grid,.focus-grid,.stats-row,.profile-layout,.lb-layout{grid-template-columns:1fr}
.page,.page-wide{padding:1.5rem 1.25rem}
.nav{padding:0 1.25rem}
.nav-center{display:none}
.land-features{grid-template-columns:1fr}
.subjects-grid{grid-template-columns:1fr 1fr}
.lb-podium{padding:1rem .5rem 0}
}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
